name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run Linter
      run: npm run lint
      
    - name: Build Next.js
      run: npm run build
      env:
        # Dummy env vars for build process
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/mydb"
        NEXTAUTH_URL: "http://localhost:3000"
        NEXTAUTH_SECRET: "dummy-secret"
        REDIS_URL: "redis://localhost:6379"

    # Note: Vercel handles the actual deployment automatically via GitHub integration,
    # so we just ensure the build and lint pass successfully here.
